<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-background-dark/80 apple-blur border-b border-gray-100 dark:border-gray-800">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="size-8 text-primary">
                <svg fill="currentColor" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z"></path>
                </svg>
            </div>
            <span class="text-lg sm:text-xl font-bold tracking-tight">{{branding.name}}</span>
        </div>
        
        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-sm font-medium hover:text-primary transition-colors" href="#solution">Solution</a>
            <a class="text-sm font-medium hover:text-primary transition-colors" href="#contact">Contact</a>
            <a href="test.html" class="bg-primary hover:bg-primary/90 text-white px-5 py-2 rounded-full text-sm font-semibold transition-all shadow-sm">
                Tester
            </a>
        </nav>
        
        <!-- Mobile Menu Button -->
        <button id="menuBtn" class="md:hidden flex items-center justify-center rounded-lg bg-gray-100 dark:bg-slate-800 h-10 w-10 relative z-[60]">
            <span class="material-symbols-outlined" style="font-size: 24px;">menu</span>
        </button>
    </div>
</header>

<!-- Mobile Menu Overlay -->
<div id="mobileOverlay" class="fixed inset-0 bg-black/50 z-[55] hidden md:hidden"></div>

<!-- Mobile Menu -->
<div id="mobileMenu" class="mobile-menu fixed top-0 right-0 bottom-0 w-72 bg-white dark:bg-gray-900 shadow-2xl md:hidden z-[60]">
    <div class="h-16 flex items-center justify-end px-4 border-b border-gray-100 dark:border-gray-800">
        <button id="closeMenuBtn" class="flex items-center justify-center rounded-lg bg-gray-100 dark:bg-slate-800 h-10 w-10">
            <span class="material-symbols-outlined" style="font-size: 24px;">close</span>
        </button>
    </div>
    <nav class="flex flex-col p-6 gap-4">
        <a class="text-lg font-medium hover:text-primary transition-colors py-2" href="#solution">Solution</a>
        <a class="text-lg font-medium hover:text-primary transition-colors py-2" href="#contact">Contact</a>
        <a href="test.html" class="bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded-xl text-base font-bold transition-all shadow-lg mt-4 text-center">
            Tester maintenant
        </a>
    </nav>
</div>
