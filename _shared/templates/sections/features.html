<!-- Features Section -->
<section class="bg-[#f5f5f7] dark:bg-gray-900/50 py-16 sm:py-24">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6">
        <div class="mb-10 sm:mb-16 text-center lg:text-left">
            <p class="text-primary text-sm font-bold uppercase tracking-widest mb-2">Fonctionnalités</p>
            <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-3 sm:mb-4">{{features.title}}</h2>
            <p class="text-base sm:text-lg text-gray-600 dark:text-gray-400 max-w-2xl mx-auto lg:mx-0">{{features.subtitle}}</p>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
            {{#each features.items}}
            <div class="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                <div class="flex items-start gap-4 sm:block">
                    <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center text-primary flex-shrink-0 sm:mb-6">
                        <span class="material-symbols-outlined text-3xl">{{this.icon}}</span>
                    </div>
                    <div>
                        <h3 class="text-lg sm:text-xl font-bold mb-2 sm:mb-3">{{this.title}}</h3>
                        <p class="text-sm sm:text-base text-gray-600 dark:text-gray-400 leading-relaxed">
                            {{this.description}}
                        </p>
                    </div>
                </div>
            </div>
            {{/each}}
        </div>
    </div>
</section>
