<!-- Solutions Section -->
<section id="solution" class="bg-[#f5f5f7] dark:bg-gray-900/50 py-16 sm:py-24">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6">
        <div class="mb-10 sm:mb-16 text-center">
            <p class="text-primary text-sm font-bold uppercase tracking-widest mb-2">Solution</p>
            <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-3 sm:mb-4">{{solutions.title}}</h2>
            <p class="text-base sm:text-lg text-gray-600 dark:text-gray-400 max-w-2xl mx-auto mb-8">{{solutions.subtitle}}</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8">
            {{#each solutions.items}}
            <div class="flex flex-col gap-4 sm:gap-5 p-5 sm:p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 transition-all hover:shadow-xl">
                <div class="w-full aspect-video bg-center bg-no-repeat bg-cover rounded-lg" style='background-image: url("{{this.image}}");'></div>
                <div>
                    <h4 class="text-lg sm:text-xl font-bold mb-2">{{this.title}}</h4>
                    <p class="text-sm sm:text-base text-gray-600 dark:text-gray-400 leading-relaxed">{{this.description}}</p>
                </div>
            </div>
            {{/each}}
        </div>
    </div>
</section>
