<!-- Audience Section -->
<section class="py-16 sm:py-24 bg-white dark:bg-background-dark">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6">
        <div class="text-center mb-12">
            <p class="text-primary text-sm font-bold uppercase tracking-widest mb-2">Pour qui ?</p>
            <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-4">{{audience.title}}</h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-4xl mx-auto">
            {{#each audience.items}}
            <div class="bg-[#f5f5f7] dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 text-center">
                <div class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center text-primary mx-auto mb-4">
                    <span class="material-symbols-outlined text-2xl">{{this.icon}}</span>
                </div>
                <h3 class="text-lg font-bold mb-2">{{this.title}}</h3>
                <p class="text-sm text-gray-600 dark:text-gray-400">{{this.description}}</p>
            </div>
            {{/each}}
        </div>
    </div>
</section>
