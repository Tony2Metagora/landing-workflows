<!-- How It Works Section -->
<section class="py-16 sm:py-24 bg-white dark:bg-background-dark">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6">
        <div class="text-center mb-12">
            <p class="text-primary text-sm font-bold uppercase tracking-widest mb-2">Processus</p>
            <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-4">{{howItWorks.title}}</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 sm:gap-8">
            {{#each howItWorks.steps}}
            <div class="relative">
                <div class="bg-[#f5f5f7] dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 h-full">
                    <div class="w-10 h-10 bg-primary text-white rounded-full flex items-center justify-center font-bold text-lg mb-4">
                        {{this.number}}
                    </div>
                    <h3 class="text-lg font-bold mb-2">{{this.title}}</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">{{this.description}}</p>
                </div>
                {{#unless @last}}
                <div class="hidden lg:block absolute top-1/2 -right-4 transform -translate-y-1/2 text-gray-300 dark:text-gray-600">
                    <span class="material-symbols-outlined text-2xl">arrow_forward</span>
                </div>
                {{/unless}}
            </div>
            {{/each}}
        </div>
    </div>
</section>
