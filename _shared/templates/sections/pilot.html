<!-- Pilot Section -->
<section class="py-16 sm:py-24 bg-white dark:bg-background-dark">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-10">
                <p class="text-primary text-sm font-bold uppercase tracking-widest mb-2">Sans risque</p>
                <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-4">{{pilot.title}}</h2>
                <p class="text-base sm:text-lg text-gray-600 dark:text-gray-400">{{pilot.subtitle}}</p>
            </div>
            <div class="bg-[#f5f5f7] dark:bg-gray-800 p-6 sm:p-8 rounded-2xl border border-gray-100 dark:border-gray-700">
                <ul class="space-y-4">
                    {{#each pilot.items}}
                    <li class="flex items-center gap-4">
                        <span class="flex-shrink-0 w-6 h-6 flex items-center justify-center rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400">
                            <span class="material-symbols-outlined text-lg">check</span>
                        </span>
                        <span class="text-gray-700 dark:text-gray-300">{{this}}</span>
                    </li>
                    {{/each}}
                </ul>
            </div>
            {{#if pilot.closing}}
            <p class="mt-8 text-center text-lg font-bold text-gray-800 dark:text-gray-200">
                {{pilot.closing}}
            </p>
            {{/if}}
        </div>
    </div>
</section>
