<!-- Hero Section -->
<section class="relative overflow-hidden bg-white dark:bg-background-dark">
    <div class="max-w-[1200px] mx-auto px-4 sm:px-6 py-12 sm:py-20 lg:py-32 flex flex-col lg:flex-row items-center gap-8 lg:gap-12">
        <div class="flex-1 text-center lg:text-left">
            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black leading-[1.1] tracking-tight mb-4 sm:mb-6">
                {{hero.title}}
            </h1>
            <p class="text-base sm:text-lg lg:text-xl text-gray-500 dark:text-gray-400 font-medium mb-4 sm:mb-6 max-w-xl mx-auto lg:mx-0">
                {{hero.subtitle}}
            </p>
            {{#if hero.objectionKillers}}
            <p class="text-sm text-gray-400 dark:text-gray-500 mb-6 sm:mb-8 max-w-xl mx-auto lg:mx-0">
                {{hero.objectionKillers}}
            </p>
            {{/if}}
            <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4">
                <a href="{{hero.ctaLink}}" class="bg-primary hover:bg-primary/90 text-white px-8 sm:px-10 py-4 sm:py-5 rounded-xl text-lg sm:text-xl font-bold transition-all shadow-lg shadow-primary/20 inline-block text-center hover:scale-105 active:scale-95">
                    {{hero.ctaText}}
                </a>
            </div>
            {{#if hero.microCopy}}
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-4 text-center lg:text-left">
                {{hero.microCopy}}
            </p>
            {{/if}}
        </div>
        <div class="flex-1 w-full max-w-2xl">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-primary to-blue-400 rounded-2xl blur opacity-25 group-hover:opacity-40 transition duration-1000 group-hover:duration-200"></div>
                <div class="relative bg-white dark:bg-gray-900 rounded-2xl shadow-2xl overflow-hidden aspect-video lg:aspect-[16/9] flex items-center justify-center border border-gray-100 dark:border-gray-800" style="background-image: url('{{hero.image}}'); background-size: cover; background-position: center;">
                </div>
            </div>
        </div>
    </div>
</section>
